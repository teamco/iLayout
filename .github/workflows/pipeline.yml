name: 'Pipeline'

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write
  actions: read

jobs:
  # ---------------------------------------------------------
  # 1. CHECK (LINT + TEST) — Matrix
  # ---------------------------------------------------------
  check:
    name: 'Check ${{ matrix.package }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [client, embed]
        include:
          - package: client
            working-directory: .
          - package: embed
            working-directory: packages/embed
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Lint
        if: matrix.package == 'client'
        run: pnpm run lint
      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.working-directory }}
        run: pnpm run test

  # ---------------------------------------------------------
  # 2. BUILD — Matrix
  # ---------------------------------------------------------
  build:
    name: 'Build ${{ matrix.package }}'
    needs: [check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [client, embed]
        include:
          - package: client
            working-directory: .
            build: pnpm run build
          - package: embed
            working-directory: packages/embed
            build: pnpm run build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.build }}

  # ---------------------------------------------------------
  # 3. RELEASE (Bump & Publish)
  # ---------------------------------------------------------
  release:
    name: 'Release'
    needs:
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup
      - name: Release Management
        id: release_management
        uses: ./.github/actions/bump
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_management.outputs.tag }}
          name: ${{ steps.release_management.outputs.tag }}
          body: ${{ steps.release_management.outputs.release_body }}
          generate_release_notes: false
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
