name: 'Pipeline'

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write
  actions: read

jobs:
  # ---------------------------------------------------------
  # 1. CHECK (LINT + TEST)
  # ---------------------------------------------------------
  check-client:
    name: 'Check Client'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Lint Apps > Client
        run: pnpm run lint
      - name: Unit Tests Apps > Client
        run: pnpm run test

  build-client:
    name: 'Build Client'
    needs: [check-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build Apps > Client
        run: pnpm run build

  # ---------------------------------------------------------
  # 2. RELEASE (Bump & Publish)
  # ---------------------------------------------------------
  release:
    name: 'Release'
    needs:
      - build-client
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup
      - name: Release Management
        uses: ./.github/actions/bump
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
